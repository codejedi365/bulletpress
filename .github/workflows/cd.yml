name: Deliver
# privileged workflow that is restricted to master

on:
  workflow_run:
    workflows: [ Push ]
    types: [ completed ]
    branches: [ master ]

jobs:

  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    environment:
      name: github-pages
    outputs:
      NEW_RELEASE: ${{ steps.semantic-release.outputs.NEW_RELEASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v5
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          fingerprint: ${{ secrets.BOT_GPG_SUBKEY_FINGERPRINT }}
          git_tag_gpgsign: true

      - name: Run semantic-release
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          npx semantic-release --debug
          echo 'NEW_RELEASE<<EOF' >> $GITHUB_OUTPUT
          node -e 'console.log(!/^0\.0\.0/.test(require("./package.json").version))' >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT


  deploy:
    name: Trigger GitHub Pages Publishing Workflow
    needs: release
    if: ${{ needs.release.outputs.NEW_RELEASE == 'true' }}
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/pages.yml
